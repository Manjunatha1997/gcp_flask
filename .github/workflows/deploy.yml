name: CI/CD - Flask Production Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # 1. Checkout code
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # 2. Setup Python
      # ----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ----------------------------
      # 3. Cache virtual environment (FASTEST)
      # ----------------------------
      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: venv
          key: ${{ runner.os }}-venv-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      # ----------------------------
      # 4. Create venv + install deps (only if needed)
      # ----------------------------
      - name: Setup venv & install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate

          pip install --upgrade pip
          pip install -r requirements.txt

      # ----------------------------
      # 5. Basic sanity check
      # ----------------------------
      - name: Import check
        run: |
          source venv/bin/activate
          python -c "import flask; print('Flask OK')"

      # ----------------------------
      # 6. Setup SSH securely
      # ----------------------------
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.GCP_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H "${{ secrets.GCP_VM_IP }}" >> ~/.ssh/known_hosts

      # ----------------------------
      # 7. Test SSH connection
      # ----------------------------
      - name: Test SSH Connection
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_IP }} \
            "echo 'SSH SUCCESS'"

      # ----------------------------
      # 8. Deploy to server
      # ----------------------------
      - name: Deploy application
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_IP }} << 'EOF'

          set -e

          APP_DIR=~/flask-app
          REPO_URL="https://github.com/${{ github.repository }}.git"

          echo "🚀 Deployment started..."

          # ----------------------------
          # Clone or update repo
          # ----------------------------
          if [ ! -d "$APP_DIR/.git" ]; then
            rm -rf $APP_DIR
            git clone $REPO_URL $APP_DIR
          fi

          cd $APP_DIR

          git reset --hard
          git pull origin main

          # ----------------------------
          # Create venv if not exists
          # ----------------------------
          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi

          source venv/bin/activate

          pip install --upgrade pip
          pip install -r requirements.txt

          # ----------------------------
          # Restart Gunicorn safely
          # ----------------------------
          pkill -f gunicorn || true
          sleep 2

          nohup gunicorn \
            --workers 3 \
            --threads 2 \
            --timeout 120 \
            --bind 0.0.0.0:5000 \
            main:app \
            > gunicorn.log 2>&1 &

          echo "✅ Deployment successful"

          EOF