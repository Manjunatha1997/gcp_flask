name: CI/CD - Flask Production Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # 1. Checkout
      # ----------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------
      # 2. Setup Python
      # ----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ----------------------------
      # 3. Install dependencies
      # ----------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ----------------------------
      # 4. Basic sanity check
      # ----------------------------
      - name: Import check
        run: |
          python -c "import flask; print('Flask OK')"

      # ----------------------------
      # 5. Setup SSH (FIXED + SECURE)
      # ----------------------------
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.GCP_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H "${{ secrets.GCP_VM_IP }}" >> ~/.ssh/known_hosts

      # ----------------------------
      # 6. Test SSH connection
      # ----------------------------
      - name: Test SSH
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_IP }} \
            "echo 'SSH OK'"

      # ----------------------------
      # 7. Deploy (idempotent + safe restart)
      # ----------------------------
      - name: Deploy to GCP VM
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_IP }} << 'EOF'

          set -e

          APP_DIR=~/flask-app
          REPO_URL="https://github.com/${{ github.repository }}.git"

          echo "🚀 Starting deployment..."

          # ----------------------------
          # 1. Setup app directory
          # ----------------------------
          if [ ! -d "$APP_DIR/.git" ]; then
            rm -rf $APP_DIR
            git clone $REPO_URL $APP_DIR
          fi

          cd $APP_DIR

          # ----------------------------
          # 2. Pull latest code
          # ----------------------------
          git reset --hard
          git pull origin main

          # ----------------------------
          # 3. Python venv
          # ----------------------------
          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi

          source venv/bin/activate

          pip install --upgrade pip
          pip install -r requirements.txt

          # ----------------------------
          # 4. Stop previous app safely
          # ----------------------------
          pkill -f gunicorn || true

          sleep 2

          # ----------------------------
          # 5. Start Gunicorn (production-ready)
          # ----------------------------
          nohup gunicorn \
            --workers 3 \
            --threads 2 \
            --timeout 120 \
            --bind 0.0.0.0:5000 \
            main:app \
            > gunicorn.log 2>&1 &

          echo "✅ Deployment successful"

          EOF