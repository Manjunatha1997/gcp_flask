name: Build and Deploy Flask App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Optional tests
      - name: Run tests
        run: |
          echo "No tests configured"

      # Configure SSH
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          cat <<EOF > ~/.ssh/id_rsa
          ${{ secrets.GCP_SSH_KEY }}
          EOF

          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H "${{ secrets.GCP_VM_IP }}" >> ~/.ssh/known_hosts

      # Debug SSH key
      - name: Validate SSH Key
        run: |
          file ~/.ssh/id_rsa
          head -n 1 ~/.ssh/id_rsa

      # Test SSH connection
      - name: Test SSH Connection
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_IP }} \
            "echo SSH SUCCESS"

      # Deploy application
      - name: Deploy application
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_IP }} << 'EOF'

            set -e

            echo "Deploy started..."

            mkdir -p ~/flask-app

            cd ~/flask-app

            # Clone repo if first deployment
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }} .
            fi

            # Pull latest code
            git pull origin main

            # Create virtual environment if missing
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            # Activate environment
            source venv/bin/activate

            # Install dependencies
            pip install -r requirements.txt

            # Stop existing Gunicorn
            pkill gunicorn || true

            # Start Gunicorn
            nohup gunicorn \
              --workers 4 \
              --bind 0.0.0.0:5000 \
              main:app > gunicorn.log 2>&1 &

            echo "Deployment completed"

          EOF